  # Content - RSVP Section
  rsvp:
    title: "Join Us"
    description: "We would be delighted to have you celebrate with us. Please let us know if you can attend."
    button_text: "RSVP Now"
    lookup_hint: "Or use the personalized link in your invitation"

  # Content - FAQ Page
  faq:
    title: "FAQ"
    subtitle: "Everything you need to know for our big day"
    questions:
      - question: "What is the dress code?"
        answer: "We kindly request formal or black tie attire — think floor-length gowns, elegant cocktail dresses, or tuxedos and dark suits. We are celebrating in style and hope you will join us dressed for the occasion."
      - question: "What time should I arrive?"
        answer: "The ceremony begins at 4:00 PM sharp. We recommend arriving by 3:30 PM to find your seat and get settled before we begin."
      - question: "Is there parking available?"
        answer: "Yes, Liberty Grand has a large parking lot available for guests at no additional charge. Rideshare services are also welcomed at the main entrance on Queens Quay."
      - question: "Are children welcome?"
        answer: "We love your little ones dearly, but we have chosen to make this an adult-only celebration so everyone can relax and enjoy the evening. We hope this gives you the chance to have a well-deserved night out!"
      - question: "Can I bring a plus one?"
        answer: "Due to venue capacity, we can only accommodate those listed on your invitation. Your invitation will indicate whether a guest has been included. If you have questions, please reach out to us directly."
      - question: "Will dietary restrictions be accommodated?"
        answer: "Absolutely. We have Chicken, Beef, Vegetarian, and Vegan options available. Please indicate your preference when you RSVP and note any allergies — we want everyone to be well taken care of."
      - question: "Is there a hotel block nearby?"
        answer: "Yes! We have reserved a room block at a nearby hotel for out-of-town guests at a special rate. Details will be included in your formal invitation package."
      - question: "Can I take photos during the ceremony?"
        answer: "We are having an unplugged ceremony — we kindly ask that all phones and cameras be put away so that everyone can be fully present. Our photographer will capture every moment, and we will share photos with you after the wedding."

