  # Notification Pipeline
  notifications:
    reminders:
      enabled: true
      send_time: "10:00"
      audience: "pending_rsvp" # all, pending_rsvp, accepted, declined
      channels:
        email:
          enabled: true
        sms:
          enabled: false
      schedule:
        - key: "week_before"
          days_before: 7
          channels: ["email"]
          email_subject: "Your wedding RSVP: one week to go"
        - key: "day_before"
          days_before: 1
          channels: ["email"]
          email_subject: "Your wedding RSVP: tomorrow is the big day"
        - key: "day_of"
          days_before: 0
          channels: ["email"]
          email_subject: "Today is wedding day"
