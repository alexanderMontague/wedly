# Wedding Configuration
# All wedding content is driven by this file.
# Update these values to customize your wedding website.

# Core Details
- id: "britt-and-alex"
  title: "Britt & Alex"
  couple:
    partner1: "Britt"
    partner2: "Alex"
    initials: "B & A"
  last_name: "Montague"

  # Date & Location
  date: "2027-07-10"
  ceremony_time: "4:00 PM"
  wedding_duration_hours: 10 # used to lock disposable camera photos
